<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background: #f4f5f7;
            color: #1f2937;
        }

        /* ---------- Sidebar ---------- */
        #users {
            width: 260px;
            background: #111827;
            border-right: 1px solid #1f2937;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        #users::-webkit-scrollbar {
            width: 6px;
        }
        #users::-webkit-scrollbar-track {
            background: transparent;
        }
        #users::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 6px;
        }

        #users::before {
            content: "Active Users";
            display: block;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 10px 12px;
        }

        .user {
            padding: 12px 14px;
            margin-bottom: 4px;
            cursor: pointer;
            border-bottom: none;
            border-radius: 10px;
            color: #e5e7eb;
            font-size: 13.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .user::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34,197,94,0.7);
            flex-shrink: 0;
        }

        .user:hover {
            background: #1f2937;
            transform: translateX(2px);
        }

        .user.active {
            background: #fcd535;
            color: #111827;
            font-weight: 600;
        }

        .user.active::before {
            background: #111827;
            box-shadow: none;
        }

        /* ---------- Chat panel ---------- */
        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        #title {
            margin: 0;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9fafb;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 6px;
        }

        #messages div {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.45;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #messages div {
            align-self: flex-start;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            color: #111827;
        }

        #input {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
        }

        #input input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            outline: none;
            font-size: 13.5px;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #input input:focus {
            border-color: #fcd535;
            box-shadow: 0 0 0 3px rgba(252,213,53,0.25);
        }

        #input button {
            background: #fcd535;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 600;
            color: #111827;
            cursor: pointer;
            transition: filter 0.15s ease, transform 0.15s ease;
        }

        #input button:hover {
            filter: brightness(1.07);
            transform: translateY(-1px);
        }

        #input button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div id="users"></div>

<div id="chat">
    <h3 id="title">Select user</h3>
    <div id="messages"></div>

    <div id="input">
        <input id="msg" placeholder="type message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
const ws = new WebSocket("ws://localhost:3000?role=admin");

let activeRoom = null;

ws.onopen = () => {
    console.log("admin connected");
};

ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "users") {
        const box = document.getElementById("users");
        box.innerHTML = "";

        data.users.forEach(id => {
            const div = document.createElement("div");
            div.className = "user";
            div.innerText = id;

            div.onclick = () => {
                document.querySelectorAll(".user.active").forEach(el => el.classList.remove("active"));
                div.classList.add("active");

                activeRoom = id;
                document.getElementById("title").innerText = "Room: " + id;
                document.getElementById("messages").innerHTML = "";
            };

            box.appendChild(div);
        });
    }

    if (data.type === "new_message") {
        if (data.roomId === activeRoom) {
            add("User: " + data.message);
        }
    }
};

function send() {
    if (!activeRoom) return alert("Select user first");

    const msg = document.getElementById("msg").value;

    ws.send(JSON.stringify({
        type: "admin_message",
        roomId: activeRoom,
        message: msg
    }));

    add("Admin: " + msg);
    document.getElementById("msg").value = "";
}

function add(text) {
    const div = document.createElement("div");
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
